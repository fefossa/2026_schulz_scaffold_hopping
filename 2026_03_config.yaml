# Example configuration for cellpainting3
# On Linux, put in $HOME/.config/cellpainting3/config.yaml
# On Windows, put in $HOME/cellpainting3/config.yaml

# adapted to new parameter set (11-Apr-2018)
# ----------------------------------------------------------------------------
# BaseDir: &BaseDir /home/f.garciafossa/projects/notebooks_pahl/cp_example/resources/comasdb/

Dirs:
    # PlatesDir: /home/f.garciafossa/projects/notebooks_pahl/cp_example/resources/plates
    PlatesDir: /home/f.garciafossa/projects/cellpainting/plates
    DataDir: /home/f.garciafossa/projects/cellpainting/resources/data
    # PlateDataDir: /home/f.garciafossa/projects/notebooks_pahl/cp_example/profiles/plate_data
    PlateDataDir: /home/f.garciafossa/projects/cellpainting/plates
    CompoundDir: /home/f.garciafossa/projects/cellpainting/resources
    ReportDir: /home/f.garciafossa/projects/notebooks_pahl/cp_example/profiles/reports
    # ClusterMaskDir: /home/f.garciafossa/projects/cellpainting/resources/cluster_masks
    ClusterMaskDir: /home/f.garciafossa/projects/clusters/experimental_clusters

Paths:
    SmilesPath: /home/f.garciafossa/projects/cellpainting/resources/comas_smiles.tsv    # tab-delim.
    SmilesCols:
        - Compound_Id
        - Smiles
        - Chiral
        - Is_Ref
    # BatchPath: /home/f.garciafossa/projects/notebooks_pahl/cp_example/resources/comasdb/comas_batch.tsv          # tab-delim.
    BatchPath: /home/f.garciafossa/projects/cellpainting/resources/comas_batch_data.tsv  
    BatchCols: []
    ContainerPath: /home/f.garciafossa/projects/cellpainting/resources/comas_container.tsv    # tab-delim.
    ContainerCols:
        - Container_Id
        - Batch_Id
        - Compound_Id
    # tab-delim.
    BatchDataPath: /home/f.garciafossa/projects/cellpainting/resources/comas_batch_data.tsv
    BatchDataCols:
        - Batch_Id
        - Supplier_Id
        - Pure_Flag
    # tab-delim.
    ContainerDataPath: /home/f.garciafossa/projects/cellpainting/resources/comas_container_data.tsv
    ContainerDataCols: []
    AnnotationsPath: /home/f.garciafossa/projects/cellpainting/resources/known_act.tsv  # tab-delim.
    ReferencesPath: /home/f.garciafossa/projects/cellpainting/resources/data/references_act_prof.tsv
    SimRefsPath: /home/f.garciafossa/projects/cellpainting/resources/data/sim_refs-*.tsv
    SimRefsExtPath: /home/f.garciafossa/projects/cellpainting/resources/data/sim_refs_ext-*.tsv
    DatastorePath: /home/f.garciafossa/projects/cellpainting/resources/data/cp_datastore-*.tsv
    DatastoreParquetPath: /home/f.garciafossa/projects/cellpainting/resources/data/cp_datastore.parquet
    DatastorePPPath: /home/f.garciafossa/projects/cellpainting/resources/data/cp_datastore_pp.tsv
    TimePointsPath: /home/f.garciafossa/projects/cellpainting/resources/data/time_points.txt
    DatastoreCols:
        - Compound_Id
        - Batch_Id
        - Container_Id
        - Well_Id
        - Producer
        - Supplier_Id
        - Conc_uM
        - Is_Ref
        - Activity
        - Toxic
        - Pure_Flag
        - Rel_Cell_Count
        - Metadata_Well
        - Plate
        - Smiles
    LayoutsPath: /home/f.garciafossa/projects/cellpainting/resources/layouts.tsv
    LayoutsJoinCol: Address_384
    LayoutsNameCol: Plate_name_384
    QCStatsPath: /home/f.garciafossa/projects/notebooks_pahl/cp_example/profiles/data/qcstats.tsv

# ----------------------------------------------------------------------------
ParameterHelp:
    AreaShape: MeasureObjectSizeShape
    Correlation: MeasureCorrelation
    Granularity: MeasureGranularity
    Intensity: MeasureObjectIntensity
    Neighbors: MeasureObjectNeighbors
    RadialDistribution: MeasureObjectRadialDistribution,
    Texture: MeasureTexture

Cutoffs:
    InductionCutoff: 1.585
    ActCutoffPerc: 5.0
    ActCutoffPercRef: 5.0
    ActCutoffPercH: 85.0
    ActCutoffPercRefH: 85.0
    OverActH: 85
    LimitCellCountH: 75
    LimitCellCountL: 50
    LimitActivityH: 20
    LimitActivityL: 5.0
    LimitSimilarityH: 80
    LimitSimilarityL: 65
    LimitProfValue: 25
    ClusterSimH: 80
    ClusterSimL: 75

Options:
    UseNewRdkitCoord: True
    InPlace: True    # whether to modifiy DataFrames inplace or not.
    ChunkSize: 4000  # Dask chunksize
    NPartitions: 10  # Dask npartitions
    Offset: 151      # Position shift between replicates
    OveractRefWellId: "350306:01:03_010.000_20h"  # Reference well for overactivity
    IgnoreSkipped:   # Ignore skipped wells for plates containing these strings:
        - "DMSO"
        - "CDI463"
        - "Matrix"
        - "Standard"
        - "NC2018"
    Skip:  # Skip individual replicates

